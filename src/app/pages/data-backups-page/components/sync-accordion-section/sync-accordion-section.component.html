<div class="rounded-lg border border-border/60 bg-card p-4">
  <h3 class="text-sm font-semibold tracking-tight">
    {{ 'dataBackups.sync.title' | translate }}
  </h3>
  <p class="mt-1 text-sm text-muted-foreground">
    {{ 'dataBackups.sync.placeholder' | translate }}
  </p>

  <div class="mt-4 grid gap-3 lg:grid-cols-2">
    <div class="rounded-md border border-border/60 bg-muted/40 p-3">
      <z-switch [zChecked]="false" [zDisabled]="true">
        {{ 'dataBackups.sync.controls.enabled' | translate }}
      </z-switch>
    </div>

    <div class="flex items-center gap-2 rounded-md border border-border/60 bg-muted/40 p-3">
      <button z-button zType="outline" [zDisabled]="true">
        {{ 'dataBackups.sync.controls.connect' | translate }}
      </button>
      <button z-button zType="ghost" [zDisabled]="true">
        {{ 'dataBackups.sync.controls.syncNow' | translate }}
      </button>
    </div>
  </div>
</div>
