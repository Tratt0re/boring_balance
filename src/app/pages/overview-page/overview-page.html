<section class="grid grid-cols-1 gap-5 lg:grid-cols-12 lg:items-stretch">
  <app-overview-net-worth-card
    class="lg:col-span-5 lg:self-stretch"
    [year]="currentCalendarYear"
    [monthIndex]="currentCalendarMonthIndex"
    [isSmallScreen]="isSingleColumnLayout()"
  ></app-overview-net-worth-card>

  <app-overview-monthly-totals-card
    class="lg:col-span-7 lg:self-stretch"
    [year]="currentCalendarYear"
    [isSmallScreen]="isSingleColumnLayout()"
  ></app-overview-monthly-totals-card>

  <app-overview-recent-transactions-card
    class="lg:col-span-5 lg:col-start-1 self-start"
    [year]="currentCalendarYear"
    [monthIndex]="currentCalendarMonthIndex"
    [limit]="recentTransactionsLimit"
    [height]="lastTransactionsCardHeight()"
    (transactionStateChanged)="onRecentTransactionStateChanged()"
  ></app-overview-recent-transactions-card>

  <app-overview-money-flow-sankey-card
    #moneyFlowSankeyCard
    class="lg:col-span-7 self-start"
    [year]="currentCalendarYear"
    [monthIndex]="currentCalendarMonthIndex"
    [isSmallScreen]="isSingleColumnLayout()"
  ></app-overview-money-flow-sankey-card>
</section>
