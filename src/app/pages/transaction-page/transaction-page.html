<section class="flex flex-col gap-4">
  @if (isLoading()) {
    <z-skeleton class="h-12 w-full"></z-skeleton>
    <z-skeleton class="h-60 w-full"></z-skeleton>
  } @else if (loadError(); as loadError) {
    <div class="rounded-md border border-destructive/30 bg-destructive/5 p-4 text-sm text-destructive">
      Failed to load transactions: {{ loadError }}
    </div>
  } @else {
    <z-segmented [zDefaultValue]="activeView()" zAriaLabel="Transaction sections" (zChange)="onViewChange($event)">
      <z-segmented-item value="common" [label]="'transactions.view.commonTransactions' | translate" />
      <z-segmented-item value="transfers" [label]="'transactions.view.transfers' | translate" />
    </z-segmented>

    @if (activeView() === 'common') {
      <div class="animate-in fade-in-0 slide-in-from-left-2 duration-200 ease-out">
        <app-transactions-table-section
          [rows]="transactions()"
          [structure]="transactionTableStructure()"
          [rowClass]="transactionRowClass"
          (editableValueChange)="onEditableValueChange($event)"
        ></app-transactions-table-section>
      </div>
    } @else {
      <div class="animate-in fade-in-0 slide-in-from-right-2 duration-200 ease-out">
        <app-transfers-table-section
          [rows]="transferRows()"
          [structure]="transferTableStructure()"
        ></app-transfers-table-section>
      </div>
    }
  }
</section>
