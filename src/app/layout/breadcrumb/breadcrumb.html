<z-header [zHeight]="null" class="justify-between gap-4 py-4">
  <div class="flex min-w-0 items-center gap-2">
    @if (isSmallScreen()) {
      <app-sidebar-toggle [sidebarCollapsed]="sidebarCollapsed()" (toggle)="toggleSidebar()"></app-sidebar-toggle>
      <div class="h-8 w-px bg-border"></div>
    }

    <nav [attr.aria-label]="'breadcrumb.ariaLabel' | translate" class="min-w-0">
      <ol class="flex items-center gap-2 overflow-hidden text-sm text-muted-foreground">
        @for (item of items(); track item.path ?? item.label; let isLast = $last) {
          <li class="flex items-center gap-2">
            @if (item.path && !isLast) {
              <a [routerLink]="item.path" class="truncate transition-colors hover:text-foreground">
                {{ item.label | translate }}
              </a>
            } @else {
              <span class="truncate font-medium text-foreground">{{ item.label | translate }}</span>
            }

            @if (!isLast) {
              <z-icon zType="chevron-right" class="size-4"></z-icon>
            }
          </li>
        }
      </ol>
    </nav>
  </div>
</z-header>
